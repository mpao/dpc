version: '3'

silent: true

env:
  name: alert
  buildversion:
    sh: 'git rev-parse --short main'
tasks:
  test:
    cmds:
      - go test -count=1 ./... -v -cover
  lint:
    cmds:
      - golangci-lint cache clean && golangci-lint run ./...
  linux:
    cmds:
      - GOOS=linux go build -ldflags "-s -w" -o bin/{{.name}}-build.{{.buildversion}} ./
  windows:
    cmds:
      - GOOS=windows go build -ldflags "-s -w" -o bin/{{.name}}-build.{{.buildversion}}.exe ./
  build:
    cmds:
      - task: test
      - task: windows
      - task: linux
  release:
    cmds:
      - go mod tidy
      - go build -ldflags "-s -w" -o bin/{{.name}}.exe ./
      - echo "Fatto! Applicazione salvata nella directory bin/"